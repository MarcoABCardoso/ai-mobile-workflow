openapi: 3.0.3
info:
  title: family-safe api
  version: 1.0.0
  description: >-
    Backend API for family location safety. Generated by `npm run generate:openapi`.
    Do not edit manually.
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /devices/register:
    post:
      summary: Register device push token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, platform]
              properties:
                token:
                  type: string
                platform:
                  type: string
                  enum: [apns, gcm]
      responses:
        '200':
          description: Token registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '401':
          description: Unauthorized
  /events:
    get:
      summary: Server-Sent Events stream
      description: Real-time family presence updates via SSE
      security:
        - bearerAuth: []
      responses:
        '200':
          description: SSE stream
          headers:
            Content-Type:
              schema:
                type: string
                example: text/event-stream
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
