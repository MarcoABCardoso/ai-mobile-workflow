# .github/workflows/deploy-prod.yml
# Runs on merge to main. Deploys all services to production,
# then runs smoke tests. Rolls back automatically on failure.
#
# Generated by bootstrap skill v0.2 — edit with care.
# Rollback uses revision-based traffic splitting:
#   Azure Container Apps: az containerapp revision
#   Cloud Run: gcloud run services update-traffic

name: Deploy to production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false  # Never cancel an in-flight production deploy

env:
  PROJECT_NAME: "{{project_name}}"
  REGISTRY: "{{registry_url}}"   # e.g. myapp.azurecr.io or gcr.io/my-project
  # Azure:
  AZURE_RESOURCE_GROUP: "{{project_name}}-rg"
  # GCP (alternative):
  # GCP_PROJECT_ID: "{{project_name}}"
  # GCP_REGION: "{{region}}"

jobs:

  # ─── Re-run full test suite on merged code ───────────────────────────────────
  test:
    name: Full test suite (merged)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx turbo run test lint
      - name: Integration tests
        run: npx turbo run test:integration
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

  # ─── Build and push container images ─────────────────────────────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      # Azure Container Registry login
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - run: az acr login --name ${{ env.REGISTRY }}

      # GCP Artifact Registry login (alternative — uncomment if cloud = gcp):
      # - uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: ${{ secrets.GCP_SA_KEY }}
      # - uses: google-github-actions/setup-gcloud@v2
      # - run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build and push all service images
        run: |
          # Build each service — add entries as services are added to the project
          for SERVICE in services/*/; do
            SERVICE_NAME=$(basename $SERVICE)
            IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}-${SERVICE_NAME}"
            TAG="${{ steps.tag.outputs.tag }}"

            echo "Building $SERVICE_NAME → $IMAGE:$TAG"
            docker build \
              --tag "$IMAGE:$TAG" \
              --tag "$IMAGE:latest" \
              --label "git-sha=$TAG" \
              --label "ai-managed=true" \
              "$SERVICE"

            docker push "$IMAGE:$TAG"
            docker push "$IMAGE:latest"
          done

  # ─── Deploy to production ────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    environment: production   # requires environment approval if configured in repo settings
    outputs:
      previous-revision: ${{ steps.get-revision.outputs.revision }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Record current revision (for rollback)
        id: get-revision
        run: |
          # Azure Container Apps — capture active revision name before deploying
          REVISION=$(az containerapp revision list \
            --name ${{ env.PROJECT_NAME }}-api \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?properties.active].name | [0]" \
            --output tsv)
          echo "revision=$REVISION" >> $GITHUB_OUTPUT
          echo "Active revision before deploy: $REVISION"

          # GCP Cloud Run equivalent (alternative):
          # gcloud run services describe SERVICE --format="value(status.traffic[0].revisionName)"

      - name: Deploy all services
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"

          for SERVICE in services/*/; do
            SERVICE_NAME=$(basename $SERVICE)
            IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}-${SERVICE_NAME}:${IMAGE_TAG}"

            echo "Deploying $SERVICE_NAME → $IMAGE"

            # Azure Container Apps
            az containerapp update \
              --name "${{ env.PROJECT_NAME }}-${SERVICE_NAME}" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --image "$IMAGE"

            # GCP Cloud Run (alternative):
            # gcloud run services update "${{ env.PROJECT_NAME }}-${SERVICE_NAME}" \
            #   --image "$IMAGE" \
            #   --region "${{ env.GCP_REGION }}"
          done

  # ─── Smoke tests ─────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke tests (production)
    runs-on: ubuntu-latest
    needs: deploy
    outputs:
      passed: ${{ steps.run.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Run smoke tests
        id: run
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          SMOKE_TEST_TOKEN: ${{ secrets.SMOKE_TEST_TOKEN }}  # pre-issued test token
        run: |
          node scripts/smoke-tests.js
          echo "passed=true" >> $GITHUB_OUTPUT
        # If this step fails, the output defaults to empty (falsy) → rollback triggers

  # ─── Rollback on smoke test failure ─────────────────────────────────────────
  rollback:
    name: Rollback production
    runs-on: ubuntu-latest
    needs: [deploy, smoke-tests]
    if: ${{ needs.smoke-tests.outputs.passed != 'true' }}
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restore previous revision
        run: |
          PREVIOUS="${{ needs.deploy.outputs.previous-revision }}"
          echo "Smoke tests failed — rolling back to revision: $PREVIOUS"

          for SERVICE in services/*/; do
            SERVICE_NAME=$(basename $SERVICE)

            # Azure Container Apps — route 100% traffic to previous revision
            az containerapp ingress traffic set \
              --name "${{ env.PROJECT_NAME }}-${SERVICE_NAME}" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --revision-weight "$PREVIOUS=100"

            # GCP Cloud Run (alternative):
            # gcloud run services update-traffic SERVICE \
            #   --to-revisions=PREVIOUS=100
          done

      - name: Alert on rollback
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production rollback triggered — ${{ github.sha }}`,
              body: [
                '## Production deployment rolled back',
                '',
                `**Commit:** ${{ github.sha }}`,
                `**Triggered by:** Smoke test failure after deploy`,
                `**Rolled back to:** ${{ needs.deploy.outputs.previous-revision }}`,
                '',
                '## Action required',
                '1. Review the smoke test logs in this workflow run',
                '2. Fix the issue on a `fix/` branch',
                '3. Merge the fix — this will trigger a new deploy',
                '',
                `**Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              ].join('\n'),
              labels: ['production', 'rollback', 'urgent'],
            });
