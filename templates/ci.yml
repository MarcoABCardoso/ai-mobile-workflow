# .github/workflows/ci.yml
# Runs on PRs targeting main. All jobs must pass before merge.
#
# Generated by bootstrap skill — edit with care.
# If you change this file, update CLAUDE.md to reflect any new status checks.
#
# iOS and Android previews are NOT here — they run on-demand via preview.yml
# (workflow_dispatch) to avoid expensive runner costs on every PR.

name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true  # Cancel superseded runs on the same branch

jobs:

  # ─── Lint & type-check ──────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx turbo run lint
      - run: npx turbo run build  # type-check via tsc --noEmit

  # ─── Unit tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx turbo run test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: '**/coverage/**'
          retention-days: 7

  # ─── Integration tests ──────────────────────────────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      NODE_ENV: test
      # Azure:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # GCP (alternative — uncomment if cloud = gcp):
      # GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx turbo run test:integration
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: '**/test-results/**'
          retention-days: 7

  # ─── Component tests (mobile) ────────────────────────────────────────────────
  component-tests:
    name: Component tests (mobile)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx turbo run test --filter=./mobile

  # ─── Expo web screenshot ─────────────────────────────────────────────────────
  expo-web-preview:
    name: Expo web preview
    runs-on: ubuntu-latest
    needs: [unit-tests, component-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Start Expo web
        run: cd mobile && CI=1 npx expo start --web &
      - name: Wait for Expo web
        run: npx wait-on http://localhost:8081 --timeout 60000
      - name: Capture screenshots
        run: |
          mkdir -p .ai-artifacts/screenshots
          npx playwright screenshot http://localhost:8081 .ai-artifacts/screenshots/web-home.png
      - uses: actions/upload-artifact@v4
        with:
          name: expo-web-screenshots
          path: .ai-artifacts/screenshots/
          retention-days: 14
