# .github/workflows/deploy-prod.yml
# Runs on merge to main. Deploys all services to production,
# then runs smoke tests. Rolls back automatically on failure.
#
# Generated by bootstrap skill — edit with care.
# Rollback uses revision-based traffic splitting (Cloud Run).

name: Deploy to production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false  # Never cancel an in-flight production deploy

env:
  PROJECT_NAME: "{{project_name}}"
  REGISTRY: "{{registry_url}}"   # e.g. us-central1-docker.pkg.dev/my-project/my-app — fill in after provisioning
  GCP_PROJECT_ID: "{{project_name}}"
  GCP_REGION: "{{region}}"

jobs:

  # ─── Guard: skip entire pipeline until registry is configured ────────────────
  # Remove this job (and its `needs:` references below) once REGISTRY is filled in.
  deploy-ready:
    name: Check deploy readiness
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        run: |
          if [[ "$REGISTRY" == *"fill-in-after-provisioning"* ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Registry URL not configured — skipping deployment pipeline"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

  # ─── Re-run full test suite on merged code ───────────────────────────────────
  test:
    name: Full test suite (merged)
    runs-on: ubuntu-latest
    needs: deploy-ready
    if: needs.deploy-ready.outputs.ready == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo run test lint
      - name: Integration tests
        run: npx turbo run test:integration
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}

  # ─── Build and push container images ─────────────────────────────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build and push all service images
        run: |
          for SERVICE in services/*/; do
            SERVICE_NAME=$(basename $SERVICE)
            IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}-${SERVICE_NAME}"
            TAG="${{ steps.tag.outputs.tag }}"

            echo "Building $SERVICE_NAME → $IMAGE:$TAG"
            docker build \
              --tag "$IMAGE:$TAG" \
              --tag "$IMAGE:latest" \
              --label "git-sha=$TAG" \
              --label "ai-managed=true" \
              "$SERVICE"

            docker push "$IMAGE:$TAG"
            docker push "$IMAGE:latest"
          done

  # ─── Deploy to production ────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    environment: production
    outputs:
      previous-revision: ${{ steps.get-revision.outputs.revision }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Record current revision (for rollback)
        id: get-revision
        run: |
          REVISION=$(gcloud run services describe ${{ env.PROJECT_NAME }}-api \
            --region ${{ env.GCP_REGION }} \
            --format "value(status.traffic[0].revisionName)")
          echo "revision=$REVISION" >> $GITHUB_OUTPUT
          echo "Active revision before deploy: $REVISION"

      - name: Deploy all services
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"

          for SERVICE in services/*/; do
            SERVICE_NAME=$(basename $SERVICE)
            IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}-${SERVICE_NAME}:${IMAGE_TAG}"

            echo "Deploying $SERVICE_NAME → $IMAGE"

            gcloud run services update "${{ env.PROJECT_NAME }}-${SERVICE_NAME}" \
              --image "$IMAGE" \
              --region "${{ env.GCP_REGION }}"
          done

  # ─── Smoke tests ─────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke tests (production)
    runs-on: ubuntu-latest
    needs: deploy
    outputs:
      passed: ${{ steps.run.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Run smoke tests
        id: run
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          SMOKE_TEST_TOKEN: ${{ secrets.SMOKE_TEST_TOKEN }}
        run: |
          node scripts/smoke-tests.js
          echo "passed=true" >> $GITHUB_OUTPUT

  # ─── Rollback on smoke test failure ─────────────────────────────────────────
  rollback:
    name: Rollback production
    runs-on: ubuntu-latest
    needs: [deploy, smoke-tests]
    if: ${{ needs.smoke-tests.outputs.passed != 'true' }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Restore previous revision
        run: |
          PREVIOUS="${{ needs.deploy.outputs.previous-revision }}"
          echo "Smoke tests failed — rolling back to revision: $PREVIOUS"

          for SERVICE in services/*/; do
            SERVICE_NAME=$(basename $SERVICE)
            gcloud run services update-traffic "${{ env.PROJECT_NAME }}-${SERVICE_NAME}" \
              --to-revisions="$PREVIOUS=100" \
              --region "${{ env.GCP_REGION }}"
          done

      - name: Alert on rollback
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production rollback triggered — ${{ github.sha }}`,
              body: [
                '## Production deployment rolled back',
                '',
                `**Commit:** ${{ github.sha }}`,
                `**Triggered by:** Smoke test failure after deploy`,
                `**Rolled back to:** ${{ needs.deploy.outputs.previous-revision }}`,
                '',
                '## Action required',
                '1. Review the smoke test logs in this workflow run',
                '2. Fix the issue on a `fix/` branch',
                '3. Merge the fix — this will trigger a new deploy',
                '',
                `**Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              ].join('\n'),
              labels: ['production', 'rollback', 'urgent'],
            });
