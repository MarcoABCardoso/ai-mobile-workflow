# .github/workflows/preview.yml
# On-demand iOS and Android preview builds — triggered manually via workflow_dispatch.
# Not part of CI (ci.yml) to avoid expensive macOS/emulator runner costs on every PR.
#
# Generated by bootstrap skill — edit with care.

name: Preview

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: both
        type: choice
        options:
          - ios
          - android
          - both

concurrency:
  group: preview-${{ github.ref }}-${{ inputs.platform }}
  cancel-in-progress: true

jobs:

  # ─── iOS preview ─────────────────────────────────────────────────────────────
  ios-preview:
    name: iOS preview
    runs-on: macos-latest
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'both' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Expo CLI
        run: npm install -g @expo/cli
      - name: Build iOS (simulator)
        run: cd mobile && npx expo build:ios --type simulator --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Boot iOS Simulator
        run: |
          DEVICE=$(xcrun simctl list devices available -j \
            | python3 -c "import sys,json; devs=json.load(sys.stdin)['devices']; \
              pairs=[(k,v) for k,vs in devs.items() for v in vs if v['isAvailable'] and 'iPhone' in v['name']]; \
              print(sorted(pairs, key=lambda x: x[1]['name'])[-1][1]['udid'])")
          xcrun simctl boot "$DEVICE"
          echo "SIMULATOR_UDID=$DEVICE" >> "$GITHUB_ENV"
      - name: Capture iOS screenshot
        run: |
          mkdir -p .ai-artifacts/screenshots
          xcrun simctl screenshot "$SIMULATOR_UDID" .ai-artifacts/screenshots/ios-home.png
      - uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: .ai-artifacts/screenshots/
          retention-days: 14

  # ─── Android preview ──────────────────────────────────────────────────────────
  android-preview:
    name: Android preview
    runs-on: ubuntu-latest
    if: ${{ inputs.platform == 'android' || inputs.platform == 'both' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Android Emulator and capture screenshot
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: Nexus 6
          script: |
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            mkdir -p .ai-artifacts/screenshots
            adb shell screencap -p /sdcard/screen.png
            adb pull /sdcard/screen.png .ai-artifacts/screenshots/android-home.png
      - uses: actions/upload-artifact@v4
        with:
          name: android-screenshots
          path: .ai-artifacts/screenshots/
          retention-days: 14
